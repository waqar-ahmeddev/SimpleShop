<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section class="py-16 px-10 bg-white">
  <div class="max-w-lg mx-auto border p-8 rounded-2xl shadow-sm">
    <h2 class="text-2xl font-bold mb-6 text-center">Contact Us</h2>
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Full Name</label>
        <input type="text" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="Enter your name">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Email Address</label>
        <input type="email" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="example@email.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Message</label>
        <textarea rows="4" class="w-full mt-1 p-3 border rounded-lg focus:ring-2 focus:ring-green-500 outline-none" placeholder="How can we help?"></textarea>
      </div>
      <button class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700 transition">Send Message</button>
    </form>
  </div>
</section>
<script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
