<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="py-8 px-10 bg-white">
  <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 space-y-4 md:space-y-0">
    <h2 class="text-3xl font-bold text-gray-800">Our Collections</h2>
    
    <div class="relative w-full md:w-72">
      <input type="text" placeholder="Search products..." class="w-full p-2 pl-10 border rounded-full focus:ring-2 focus:ring-green-500 outline-none border-gray-300">
      <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
    </div>
  </div>

  <div class="flex space-x-4 overflow-x-auto pb-4 scrollbar-hide">
    <button class="bg-green-600 text-white px-6 py-2 rounded-full shadow-md">All Products</button>
    <button class="bg-gray-100 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-200 transition">Watches</button>
    <button class="bg-gray-100 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-200 transition">Headphones</button>
    <button class="bg-gray-100 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-200 transition">Accessories</button>
    <button class="bg-gray-100 text-gray-700 px-6 py-2 rounded-full hover:bg-gray-200 transition">Fashion</button>
  </div>
</div>
<script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
